<script>
    async function loadProductDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        // --- LINK CLOUDFLARE XỊN CỦA THỌ ---
        const CLOUD_LINK = 'https://pros-sega-yukon-raised.trycloudflare.com'; 

        if (!productId) return;

        try {
            const response = await fetch(`${CLOUD_LINK}/api/collections/sanpham/records/${productId}`);
            const sp = await response.json();

            // 1. Đổ tên, giá và mô tả
            document.getElementById('product-name').innerText = sp.ten;
            document.getElementById('product-price').innerText = `${Number(sp.gia).toLocaleString('vi-VN')} VNĐ`;
            document.getElementById('product-description').innerText = sp.mo_ta;

            // 2. Xử lý ảnh chính
            const mainImg = sp.anh && sp.anh.length > 0 
                ? `${CLOUD_LINK}/api/files/sanpham/${sp.id}/${sp.anh[0]}`
                : 'https://via.placeholder.com/400';
            document.getElementById('product-img').src = mainImg;

            // 3. Xử lý 5 tấm ảnh nhỏ (Gallery)
            const imagesHTML = sp.anh.map(fileName => `
                <img src="${CLOUD_LINK}/api/files/sanpham/${sp.id}/${fileName}" 
                     style="width: 18%; margin: 5px; cursor: pointer; border: 2px solid #eee; border-radius: 10px;"
                     onclick="document.getElementById('product-img').src=this.src">
            `).join('');

            // Chèn đống ảnh đó vào đúng chỗ chứa gallery
            const galleryContainer = document.getElementById('product-gallery');
            if (galleryContainer) {
                galleryContainer.innerHTML = imagesHTML;
            }

        } catch (error) {
            console.error('Lỗi rồi Thọ ơi:', error);
        }
    }
    loadProductDetail();
</script>
