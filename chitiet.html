<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chi Tiết Sản Phẩm - ElectroShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root {
      --primary: #6c3bff;
      --accent: #ff6b35;
      --accent2: #00d4aa;
      --bg: #f8f7ff;
      --white: #fff;
      --dark: #1a1040;
      --text: #2d2d2d;
      --muted: #6b7280;
      --border: #e5e7eb;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
    img{display:block}a{text-decoration:none}button{font-family:inherit}
    
    /* NAV */
    nav{position:sticky;top:0;z-index:300;background:var(--white);border-bottom:1px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,0.06)}
    .nav-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:20px;padding:0 24px;height:64px}
    .logo{display:flex;align-items:center;gap:9px;font-size:1.2rem;font-weight:800;color:var(--primary);cursor:pointer}
    .logo-box{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center}
    .nav-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
    .icon-btn{background:none;border:1px solid var(--border);width:40px;height:40px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--muted)}
    .icon-btn:hover{border-color:var(--primary);color:var(--primary);background:rgba(108,59,255,0.05)}
    .nbadge{position:absolute;top:-5px;right:-5px;background:var(--accent);color:#fff;font-size:0.6rem;font-weight:800;min-width:17px;height:17px;border-radius:99px;display:flex;align-items:center;justify-content:center}
    .btn-back{background:none;border:1px solid var(--border);border-radius:8px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .2s}
    .btn-back:hover{border-color:var(--primary);color:var(--primary);background:rgba(108,59,255,0.05)}
    
    .container{max-width:1280px;margin:0 auto;padding:0 24px}
    
    /* DETAIL PAGE */
    .detail-page{padding:40px 0}
    .breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:0.82rem;color:var(--muted)}
    .breadcrumb span{cursor:pointer}
    .breadcrumb span:hover{color:var(--primary)}
    
    .detail-wrapper{display:grid;grid-template-columns:1.2fr 1fr;gap:48px;align-items:start}
    
    /* GALLERY */
    .gallery-section{position:sticky;top:80px}
    .main-img{width:100%;height:450px;background:#f3f4f6;border-radius:16px;overflow:hidden;margin-bottom:16px}
    .main-img img{width:100%;height:100%;object-fit:cover}
    .thumbnails{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .thumb{width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid var(--border);transition:all .2s;background:#f3f4f6}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .thumb.active,.thumb:hover{border-color:var(--primary);box-shadow:0 4px 12px rgba(108,59,255,0.2)}
    
    /* INFO SECTION */
    .info-section{}
    .breadcrumb-cat{font-size:0.75rem;color:var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
    .product-name{font-size:2rem;font-weight:800;line-height:1.2;margin-bottom:12px}
    .rating-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
    .stars{display:flex;gap:2px}
    .star{color:#fbbf24;width:16px;height:16px}
    .rating-text{color:var(--muted);font-size:0.85rem}
    .sold-text{color:var(--muted);font-size:0.82rem;padding-left:12px;border-left:1px solid var(--border)}
    
    /* PRICE */
    .price-block{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    .price-now{font-size:2.2rem;font-weight:800;color:var(--primary)}
    .price-old{font-size:1.1rem;color:var(--muted);text-decoration:line-through}
    .discount-badge{background:var(--accent);color:#fff;font-size:0.8rem;font-weight:700;padding:6px 12px;border-radius:99px}
    
    /* DESC */
    .desc-block{background:#f8f7ff;border-radius:12px;padding:20px;margin-bottom:24px;line-height:1.7;color:var(--muted);font-size:0.95rem}
    
    /* SPECS */
    .specs-block{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
    .specs-title{font-weight:700;font-size:1rem;margin-bottom:16px}
    .spec-row{display:grid;grid-template-columns:150px 1fr;gap:20px;padding:12px 0;border-bottom:1px solid var(--border);font-size:0.9rem}
    .spec-row:last-child{border-bottom:none}
    .spec-label{font-weight:600;color:var(--primary)}
    .spec-value{color:var(--text)}
    
    /* QTY & BUTTONS */
    .qty-section{display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .qty-label{font-weight:600;color:var(--muted);font-size:0.9rem}
    .qty-ctrl{display:flex;align-items:center;gap:8px;background:#f3f4f6;border-radius:10px;padding:4px}
    .qty-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--white);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .qty-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
    .qty-num{font-weight:700;min-width:32px;text-align:center;font-size:1rem}
    
    .action-buttons{display:flex;gap:12px;margin-bottom:24px}
    .btn-buy{flex:1;background:linear-gradient(135deg,var(--primary),var(--accent2));color:#fff;border:none;border-radius:12px;padding:16px;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-buy:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(108,59,255,0.35)}
    .btn-cart{flex:1;background:none;border:2px solid var(--primary);color:var(--primary);border-radius:12px;padding:14px;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s}
    .btn-cart:hover{background:rgba(108,59,255,0.06)}
    
    /* GUARANTEES */
    .guarantees{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
    .guarantee{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--muted);background:#f8f7ff;padding:10px 14px;border-radius:10px}
    .guarantee svg{color:var(--accent2);flex-shrink:0}
    
    /* TOAST */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:14px 26px;border-radius:99px;font-size:0.9rem;font-weight:500;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 30px rgba(0,0,0,0.25)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
    
    @media(max-width:768px){
      .detail-wrapper{grid-template-columns:1fr;gap:24px}
      .gallery-section{position:static}
      .action-buttons{flex-direction:column}
      .thumbnails{grid-template-columns:repeat(4,1fr)}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <button class="btn-back" onclick="window.history.back()" title="Quay lại">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <div class="logo" onclick="window.location.href='index.html'">
      <div class="logo-box"><svg width="18" height="18"><use href="#ic-bolt" stroke="#fff"/></svg></div>
      ElectroShop
    </div>
    <div class="nav-actions">
      <button class="icon-btn" title="Giỏ hàng" style="position:relative">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="nbadge" id="cartBadge">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- SVG SPRITE -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="ic-bolt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></symbol>
  <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></symbol>
  <symbol id="ic-star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="currentColor"/></symbol>
  <symbol id="ic-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></symbol>
  <symbol id="ic-minus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></symbol>
</svg>

<div class="container detail-page">
  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <span onclick="window.location.href='index.html'">Trang chủ</span>
    <span> / </span>
    <span id="breadCat">Sản phẩm</span>
    <span> / </span>
    <span id="breadName" style="color:var(--text)">Chi tiết</span>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="detail-wrapper" id="detailContent">
    <!-- Loading state -->
    <div style="text-align:center;padding:60px;color:var(--muted)">Đang tải sản phẩm...</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const fmtPrice = n => n.toLocaleString('vi-VN') + 'đ';
  
  function starsHtml(n) {
    let h = '';
    for (let i = 1; i <= 5; i++) {
      h += `<svg class="star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="${i<=n?'#fbbf24':'#d1d5db'}"/></svg>`;
    }
    return h;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerHTML = `<svg width="16" height="16" style="color:var(--accent2)"><use href="#ic-check"/></svg> ${msg}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  async function loadProductDetail() {
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const CLOUD_LINK = 'https://pros-sega-yukon-raised.trycloudflare.com';

    if (!productId) {
      document.getElementById('detailContent').innerHTML = '<p style="text-align:center;color:var(--muted)">Không tìm thấy sản phẩm</p>';
      return;
    }

    try {
      const res = await fetch(`${CLOUD_LINK}/api/collections/sanpham/records/${productId}`);
      const sp = await res.json();

      const mainImg = sp.anh?.length > 0 ? `${CLOUD_LINK}/api/files/sanpham/${sp.id}/${sp.anh[0]}` : 'https://via.placeholder.com/450';
      
      // Tạo 5 ảnh (pad với placeholder nếu cần)
      const images = [];
      if (sp.anh?.length > 0) {
        sp.anh.forEach(f => images.push(`${CLOUD_LINK}/api/files/sanpham/${sp.id}/${f}`));
      }
      while (images.length < 5) {
        images.push('https://via.placeholder.com/150');
      }
      
      const thumbsHtml = images.map((img, idx) => `
        <div class="thumb ${idx === 0 ? 'active' : ''}" onclick="changeImg(this, '${img}')">
          <img src="${img}" alt="Hình ${idx+1}"/>
        </div>
      `).join('');

      document.getElementById('breadCat').textContent = 'Linh kiện điện tử';
      document.getElementById('breadName').textContent = sp.ten;

      const html = `
        <!-- GALLERY -->
        <div class="gallery-section">
          <div class="main-img">
            <img id="mainImg" src="${mainImg}" alt="${sp.ten}"/>
          </div>
          <div class="thumbnails">
            ${thumbsHtml}
          </div>
        </div>

        <!-- INFO -->
        <div class="info-section">
          <div class="breadcrumb-cat">LINH KIỆN ĐIỆN TỬ</div>
          <h1 class="product-name">${sp.ten}</h1>
          
          <div class="rating-row">
            <div class="stars">
              ${starsHtml(4)}
            </div>
            <span class="rating-text">4.5/5 · 234 đánh giá</span>
            <span class="sold-text">Đã bán 1.2k</span>
          </div>

          <!-- PRICE -->
          <div class="price-block">
            <span class="price-now">${fmtPrice(Number(sp.gia))}</span>
            <span class="price-old">${fmtPrice(Number(sp.gia) + 100000)}</span>
            <span class="discount-badge">-12%</span>
          </div>

          <!-- DESC -->
          <div class="desc-block">
            <strong>Mô tả chi tiết:</strong><br><br>
            ${sp.mo_ta || 'Sản phẩm chất lượng cao, chính hãng 100%'}<br><br>
            <strong>Ưu điểm nổi bật:</strong><br>
            • Công nghệ hiện đại, hiệu suất cao<br>
            • Thiết kế compact, tiết kiệm năng lượng<br>
            • Bảo hành chính hãng 12 tháng<br>
            • Hỗ trợ kỹ thuật 24/7
          </div>

          <!-- SPECS -->
          <div class="specs-block">
            <div class="specs-title">📋 Thông số kỹ thuật</div>
            <div class="spec-row">
              <div class="spec-label">Tên sản phẩm</div>
              <div class="spec-value">${sp.ten}</div>
            </div>
            <div class="spec-row">
              <div class="spec-label">Loại</div>
              <div class="spec-value">Linh kiện điện tử</div>
            </div>
            <div class="spec-row">
              <div class="spec-label">Xuất xứ</div>
              <div class="spec-value">Chính hãng</div>
            </div>
            <div class="spec-row">
              <div class="spec-label">Bảo hành</div>
              <div class="spec-value">12 tháng chính hãng</div>
            </div>
            <div class="spec-row">
              <div class="spec-label">Giá</div>
              <div class="spec-value">${fmtPrice(Number(sp.gia))}</div>
            </div>
            <div class="spec-row">
              <div class="spec-label">Kho</div>
              <div class="spec-value" style="color:var(--accent2)">✓ Còn 99 sản phẩm</div>
            </div>
          </div>

          <!-- QTY -->
          <div class="qty-section">
            <label class="qty-label">Số lượng:</label>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(-1)"><svg width="16" height="16"><use href="#ic-minus"/></svg></button>
              <span class="qty-num" id="qtyNum">1</span>
              <button class="qty-btn" onclick="changeQty(1)"><svg width="16" height="16"><use href="#ic-plus"/></svg></button>
            </div>
          </div>

          <!-- BUTTONS -->
          <div class="action-buttons">
            <button class="btn-buy" onclick="buyNow('${sp.id}')">💳 Mua ngay</button>
            <button class="btn-cart" onclick="addToCart('${sp.id}')">🛒 Thêm giỏ hàng</button>
          </div>

          <!-- GUARANTEES -->
          <div class="guarantees">
            <div class="guarantee"><svg width="14" height="14"><use href="#ic-check"/></svg> Chính hãng 100%</div>
            <div class="guarantee"><svg width="14" height="14"><use href="#ic-check"/></svg> Giao hàng nhanh</div>
            <div class="guarantee"><svg width="14" height="14"><use href="#ic-check"/></svg> Đổi trả dễ dàng</div>
          </div>
        </div>
      `;

      document.getElementById('detailContent').innerHTML = html;
      updateCartBadge();
    } catch (e) {
      console.error(e);
      document.getElementById('detailContent').innerHTML = '<p style="text-align:center;color:red">Lỗi tải sản phẩm!</p>';
    }
  }

  let qty = 1;
  function changeQty(n) {
    qty = Math.max(1, qty + n);
    document.getElementById('qtyNum').textContent = qty;
  }

  function changeImg(el, src) {
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('mainImg').src = src;
  }

  function addToCart(id) {
    let cart = JSON.parse(localStorage.getItem('es_cart') || '{}');
    cart[id] = (cart[id] || 0) + qty;
    localStorage.setItem('es_cart', JSON.stringify(cart));
    updateCartBadge();
    showToast('Đã thêm vào giỏ hàng!');
  }

  function buyNow(id) {
    addToCart(id);
    setTimeout(() => window.location.href = 'index.html?page=cart', 500);
  }

  function updateCartBadge() {
    const cart = JSON.parse(localStorage.getItem('es_cart') || '{}');
    const count = Object.values(cart).reduce((a,b) => a+b, 0);
    document.getElementById('cartBadge').textContent = count;
  }

  loadProductDetail();
  updateCartBadge();
</script>

</body>
</html>
