<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Chi tiết sản phẩm — ElectroShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --primary:#6c3bff;--primary2:#8b5cf6;
      --bg:#f8f7ff;--surface:#fff;--text:#2d2d2d;--muted:#6b7280;
      --border:#e5e7eb;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,.08);
    }
    [data-theme=dark]{
      --bg:#0f1117;--surface:#1a1d27;--text:#e2e8f0;--muted:#a0aec0;
      --border:#2d3748;--shadow:0 2px 16px rgba(0,0,0,.4);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text)}
    a{text-decoration:none;color:inherit}

    /* ── Header ── */
    .header{background:linear-gradient(135deg,#6c3bff,#8b5cf6);
      padding:0 24px;height:60px;display:flex;align-items:center;
      gap:16px;position:sticky;top:0;z-index:99;
      box-shadow:0 2px 12px rgba(108,59,255,.4)}
    .logo{color:#fff;font-size:1.2rem;font-weight:800}
    .nav{display:flex;gap:20px;margin-left:24px}
    .nav a{color:rgba(255,255,255,.85);font-size:.9rem;font-weight:500;
      padding:4px 0;border-bottom:2px solid transparent;transition:.2s}
    .nav a:hover,.nav a.active{color:#fff;border-bottom-color:#fff}
    .header-right{margin-left:auto;display:flex;gap:10px;align-items:center}
    .btn-hdr{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;
      font-size:.85rem;font-weight:600}
    .btn-cart{background:rgba(255,255,255,.2);color:#fff}
    .btn-theme{background:rgba(255,255,255,.15);color:#fff;padding:7px 10px}

    /* ── Breadcrumb ── */
    .breadcrumb{max-width:1000px;margin:16px auto;padding:0 16px;
      font-size:.85rem;color:var(--muted);display:flex;gap:8px;align-items:center}
    .breadcrumb a{color:var(--primary)}
    .breadcrumb a:hover{text-decoration:underline}

    /* ── Detail layout ── */
    .wrap{max-width:1000px;margin:0 auto;padding:0 16px 40px}
    .detail{background:var(--surface);border-radius:var(--radius);
      border:1px solid var(--border);box-shadow:var(--shadow);
      display:grid;grid-template-columns:1fr 1fr;gap:0;overflow:hidden}
    @media(max-width:640px){.detail{grid-template-columns:1fr}}

    .detail-img-side{background:linear-gradient(135deg,#ede9fe,#ddd6fe);
      display:flex;align-items:center;justify-content:center;
      min-height:280px;font-size:7rem;padding:24px}
    .detail-img-side img{width:100%;height:300px;object-fit:contain}

    .detail-info{padding:28px;display:flex;flex-direction:column;gap:14px}
    .detail-name{font-size:1.5rem;font-weight:800;line-height:1.3}
    .detail-price{font-size:1.8rem;font-weight:800;
      background:linear-gradient(135deg,#6c3bff,#8b5cf6);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .detail-cat{display:inline-block;background:linear-gradient(135deg,#6c3bff,#8b5cf6);
      color:#fff;padding:4px 14px;border-radius:999px;font-size:.82rem;width:fit-content}
    .detail-desc{color:var(--muted);line-height:1.7;font-size:.95rem}
    .detail-stock{font-size:.9rem;color:var(--muted)}
    .detail-meta{font-size:.8rem;color:var(--muted);opacity:.7}

    /* Specs table */
    .specs{width:100%;border-collapse:collapse;margin-top:4px}
    .specs tr:not(:last-child){border-bottom:1px solid var(--border)}
    .specs td{padding:8px 0;font-size:.88rem}
    .specs td:first-child{color:var(--muted);width:45%;font-weight:600}
    .specs td:last-child{font-weight:500}

    /* Actions */
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
    .btn-cart-main{padding:12px 24px;background:linear-gradient(135deg,#6c3bff,#8b5cf6);
      color:#fff;border:none;border-radius:10px;font-size:1rem;
      font-weight:700;cursor:pointer;flex:1}
    .btn-back-main{padding:12px 20px;background:var(--bg);
      border:2px solid var(--border);border-radius:10px;
      font-size:.95rem;font-weight:600;cursor:pointer;color:var(--text)}
    .btn-back-main:hover{border-color:var(--primary);color:var(--primary)}

    /* Related */
    .related{margin-top:32px}
    .related-title{font-size:1.2rem;font-weight:700;margin-bottom:16px}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
    .rel-card{background:var(--surface);border-radius:var(--radius);
      border:1px solid var(--border);box-shadow:var(--shadow);
      overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;
      text-decoration:none;color:var(--text);display:block}
    .rel-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(108,59,255,.18)}
    .rel-img{height:90px;background:linear-gradient(135deg,#ede9fe,#ddd6fe);
      display:flex;align-items:center;justify-content:center;font-size:2.2rem}
    .rel-body{padding:10px}
    .rel-name{font-size:.88rem;font-weight:700;margin-bottom:4px}
    .rel-price{font-size:.85rem;font-weight:700;
      background:linear-gradient(135deg,#6c3bff,#8b5cf6);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent}

    /* Loading */
    .loading{text-align:center;padding:60px;color:var(--muted);font-size:1rem}
    .spinner{display:inline-block;width:36px;height:36px;border:3px solid var(--border);
      border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Toast */
    .toast{position:fixed;bottom:24px;right:24px;background:#10b981;color:#fff;
      padding:12px 20px;border-radius:10px;font-weight:600;
      transform:translateY(80px);opacity:0;transition:.3s;z-index:999}
    .toast.show{transform:translateY(0);opacity:1}
  </style>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">⚡ ElectroShop</a>
  <nav class="nav">
    <a href="index.html">Trang chủ</a>
    <a href="chitiet.html" class="active">Sản phẩm</a>
    <a href="news.html">📰 Báo</a>
  </nav>
  <div class="header-right">
    <button class="btn-hdr btn-cart" onclick="location.href='cart.html'">🛒 Giỏ hàng</button>
    <button class="btn-hdr btn-theme" onclick="toggleTheme()"><span id="themeIco">🌙</span></button>
  </div>
</header>

<div class="breadcrumb">
  <a href="index.html">Trang chủ</a> ›
  <a href="index.html">Sản phẩm</a> ›
  <span id="breadcrumbName">Chi tiết</span>
</div>

<div class="wrap">
  <div id="detailContainer" class="loading">
    <div class="spinner"></div>
    <p style="margin-top:12px">Đang tải sản phẩm...</p>
  </div>
  <div class="related" id="relatedSection" style="display:none">
    <div class="related-title">🔥 Sản phẩm tương tự</div>
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</div>

<div class="toast" id="toast">✅ Đã thêm vào giỏ hàng!</div>

<script src="api.js"></script>
<script src="cart.js"></script>
<script>
/* ── Helpers ── */
function qs(id){ return document.getElementById(id); }

function iconFor(item){
  const n=(item.ten||item.name||'').toLowerCase();
  const l=(item.loai||item.category||'').toLowerCase();
  if(n.includes('iphone')||l.includes('phone')||n.includes('điện thoại')) return '📱';
  if(n.includes('macbook')||n.includes('laptop')||l.includes('laptop')) return '💻';
  if(n.includes('airpod')||n.includes('tai nghe')||l.includes('audio')) return '🎧';
  if(n.includes('watch')||n.includes('đồng hồ')||l.includes('watch')) return '⌚';
  if(n.includes('ipad')||n.includes('tablet')||l.includes('tablet')) return '🔋';
  if(n.includes('camera')||n.includes('máy ảnh')) return '📷';
  if(n.includes('tivi')||n.includes('samsung tv')||l.includes('tv')) return '🖥️';
  if(n.includes('playstation')||n.includes('xbox')||l.includes('game')) return '🎮';
  return '📦';
}

function fmtPrice(p){
  if(!p) return 'Liên hệ';
  if(typeof p==='string') return p;
  return Number(p).toLocaleString('vi-VN')+'₫';
}

function showToast(msg){
  const t=qs('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── Hardcoded fallback data ── */
const FALLBACK=[
  {id:1,icon:'📱',name:'iPhone 15 Pro',loai:'Điện thoại',desc:'Chip A17 Pro, camera 48MP, Dynamic Island, titan xịn',price:'27.990.000₫',specs:[['Chip','A17 Pro Bionic'],['Camera','Hệ thống 48MP'],['Pin','~23h video'],['Cổng','USB-C'],['RAM','8GB'],['Màn hình','6.1" Super Retina XDR']]},
  {id:2,icon:'💻',name:'MacBook Air M3',loai:'Laptop',desc:'M3 chip, 8GB RAM, 256GB SSD, 18 giờ pin',price:'28.990.000₫',specs:[['Chip','Apple M3'],['RAM','8GB Unified'],['SSD','256GB'],['Pin','18h'],['Màn hình','13.6" Liquid Retina'],['Cổng','2× USB-C / MagSafe']]},
  {id:3,icon:'🎧',name:'AirPods Pro 2',loai:'Tai nghe',desc:'Active Noise Cancellation thế hệ 2, USB-C',price:'6.490.000₫',specs:[['Chip','H2'],['ANC','Thế hệ 2, -45dB'],['Pin','6h (+30h case)'],['Kết nối','BT 5.3'],['Cổng','USB-C'],['Kháng nước','IPX4']]},
  {id:4,icon:'⌚',name:'Apple Watch S9',loai:'Đồng hồ',desc:'S9 chip, màn hình Always-On, Double Tap',price:'10.990.000₫',specs:[['Chip','S9 SiP'],['Màn hình','45mm LTPO OLED'],['Pin','~18h'],['Kháng nước','50m'],['Chip NFC','Có'],['eSIM','Có']]},
  {id:5,icon:'🔋',name:'iPad Pro M4',loai:'Máy tính bảng',desc:'Chip M4, màn hình OLED 11", WiFi 6E siêu nhanh',price:'24.990.000₫',specs:[['Chip','Apple M4'],['Màn hình','11" Ultra Retina XDR OLED'],['RAM','8GB'],['WiFi','6E (3.6 Gbps)'],['Pin','~10h'],['Cổng','USB-C 4 / Thunderbolt 4']]},
  {id:6,icon:'📷',name:'Sony ZV-E10 II',loai:'Máy ảnh',desc:'Cảm biến APS-C mới, quay 4K 60fps',price:'18.990.000₫',specs:[['Cảm biến','APS-C 26MP'],['Video','4K 60fps'],['ISO','100-51200'],['Lấy nét','AI hybrid AF'],['Ổn định','OSS 5 trục'],['Kết nối','USB-C / WiFi 6']]},
  {id:7,icon:'🎮',name:'PlayStation 5 Slim',loai:'Game',desc:'PS5 Slim, ổ đĩa rời, 1TB SSD cực nhanh',price:'14.990.000₫',specs:[['CPU','AMD Zen 2 3.5GHz'],['GPU','RDNA 2 10.3 TFLOPS'],['RAM','16GB GDDR6'],['SSD','1TB NVMe'],['Ổ đĩa','Rời (tùy chọn)'],['HDMI','2.1 / 4K 120Hz']]},
  {id:8,icon:'🖥️',name:'Samsung OLED S90C 55"',loai:'TV',desc:'OLED 4K 120Hz, HDR10+, tivi gaming đỉnh',price:'22.990.000₫',specs:[['Màn hình','55" 4K OLED'],['Tần số','120Hz'],['HDR','HDR10+ / HLG'],['OS','Tizen 7.0'],['HDMI','4×HDMI 2.1'],['Âm thanh','4.2.2ch 60W']]},
];

/* ── Load product ── */
async function loadProduct(){
  const params=new URLSearchParams(location.search);
  const rawId=params.get('id')||'';
  const container=qs('detailContainer');

  // Thử load từ PocketBase/API trước
  try{
    const p=await API.fetchProduct(rawId);
    if(p && (p.id||p.ten)){
      renderFromApi(p);
      loadRelated(p.loai||p.category||'');
      return;
    }
  }catch(e){
    console.warn('[Detail] API fail, dùng fallback:',e.message);
  }

  // Fallback: dùng hardcoded data
  const numId=parseInt(rawId)||1;
  const p=FALLBACK.find(x=>x.id===numId)||FALLBACK[0];
  renderHardcoded(p);
  loadRelated(p.loai, numId);
}

function renderFromApi(p){
  const PB_URL=`http://${location.hostname}:8090`;
  const imgSrc=p.anh&&p.anh.length
    ?API.fileUrl(PB_URL,p.collectionId,p.id,p.anh[0])
    :null;
  const icon=iconFor(p);
  const name=p.ten||p.name||'Sản phẩm';
  const price=fmtPrice(p.gia||p.price);
  const desc=p.mo_ta||p.description||'Chưa có mô tả.';
  const cat=p.loai||p.category||'';

  qs('breadcrumbName').textContent=name;
  document.title=name+' — ElectroShop';

  qs('detailContainer').innerHTML=`
    <div class="detail">
      <div class="detail-img-side">
        ${imgSrc?`<img src="${imgSrc}" alt="${name}">`:`<span>${icon}</span>`}
      </div>
      <div class="detail-info">
        <div class="detail-name">${name}</div>
        <div class="detail-price">${price}</div>
        ${cat?`<span class="detail-cat">${cat}</span>`:''}
        <div class="detail-desc">${desc}</div>
        <table class="specs">
          <tr><td>Mã SP</td><td>${p.id||'—'}</td></tr>
          ${cat?`<tr><td>Danh mục</td><td>${cat}</td></tr>`:''}
        </table>
        <div class="actions">
          <button class="btn-back-main" onclick="history.back()">← Quay lại</button>
          <button class="btn-cart-main" onclick="addToCart(${JSON.stringify({id:p.id,name,price,icon})})">🛒 Thêm vào giỏ</button>
        </div>
      </div>
    </div>`;
}

function renderHardcoded(p){
  qs('breadcrumbName').textContent=p.name;
  document.title=p.name+' — ElectroShop';

  const specRows=(p.specs||[]).map(([k,v])=>
    `<tr><td>${k}</td><td>${v}</td></tr>`).join('');

  qs('detailContainer').innerHTML=`
    <div class="detail">
      <div class="detail-img-side">${p.icon}</div>
      <div class="detail-info">
        <div class="detail-name">${p.name}</div>
        <div class="detail-price">${p.price}</div>
        ${p.loai?`<span class="detail-cat">${p.loai}</span>`:''}
        <div class="detail-desc">${p.desc}</div>
        ${specRows?`<table class="specs">${specRows}</table>`:''}
        <div class="actions">
          <button class="btn-back-main" onclick="history.back()">← Quay lại</button>
          <button class="btn-cart-main" onclick="addToCart(${JSON.stringify({id:p.id,name:p.name,price:p.price,icon:p.icon})})">🛒 Thêm vào giỏ</button>
        </div>
      </div>
    </div>`;
}

function addToCart(item){
  const cart=JSON.parse(localStorage.getItem('es-cart')||'[]');
  const idx=cart.findIndex(x=>x.id===item.id);
  if(idx>=0) cart[idx].qty=(cart[idx].qty||1)+1;
  else cart.push({...item,qty:1});
  localStorage.setItem('es-cart',JSON.stringify(cart));
  showToast('✅ Đã thêm vào giỏ hàng!');
}

async function loadRelated(loai, excludeId){
  try{
    const data=await API.fetchProducts({perPage:4,filter:loai?`loai="${loai}"`:''});
    const items=(data.items||[]).filter(x=>x.id!==excludeId).slice(0,4);
    if(!items.length) return;
    qs('relatedSection').style.display='';
    qs('relatedGrid').innerHTML=items.map(p=>{
      const icon=iconFor(p);
      return `<a class="rel-card" href="chitiet.html?id=${p.id}">
        <div class="rel-img">${icon}</div>
        <div class="rel-body">
          <div class="rel-name">${p.ten||p.name}</div>
          <div class="rel-price">${fmtPrice(p.gia||p.price)}</div>
        </div>
      </a>`;
    }).join('');
  }catch(e){
    // Related không load được → ẩn section, không crash
    const rel=FALLBACK.filter(x=>x.loai===loai&&x.id!==excludeId).slice(0,3);
    if(!rel.length) return;
    qs('relatedSection').style.display='';
    qs('relatedGrid').innerHTML=rel.map(p=>`
      <a class="rel-card" href="chitiet.html?id=${p.id}">
        <div class="rel-img">${p.icon}</div>
        <div class="rel-body">
          <div class="rel-name">${p.name}</div>
          <div class="rel-price">${p.price}</div>
        </div>
      </a>`).join('');
  }
}

/* ── Dark mode ── */
function toggleTheme(){
  const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('es-theme',t);
  qs('themeIco').textContent=t==='dark'?'☀️':'🌙';
}
(function(){
  const s=localStorage.getItem('es-theme');
  if(s){document.documentElement.setAttribute('data-theme',s);
    if(qs('themeIco')) qs('themeIco').textContent=s==='dark'?'☀️':'🌙';
  }else if(window.matchMedia('(prefers-color-scheme:dark)').matches){
    document.documentElement.setAttribute('data-theme','dark');
    if(qs('themeIco')) qs('themeIco').textContent='☀️';
  }
})();

loadProduct();
</script>
</body>
</html>
